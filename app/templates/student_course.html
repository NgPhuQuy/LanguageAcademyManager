{% extends "layout/base.html" %}

{% block content %}

<div class="container my-5 page-content dashboard-page">

    <!-- WELCOME -->
    <div class="mb-5">
        <h2 class="fw-bold mb-1 text-primary">
            Chào mừng {{current_user.name}}👋
        </h2>
        <p class="text-muted">
            Tổng quan các khóa học bạn đang tham gia
        </p>
    </div>

    <!-- COURSE LIST -->
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold text-primary mb-0">
                    📚 Khóa học của tôi
                </h4>
            </div>

            <div class="row g-4">
                {%for c in courses%}
                <!-- COURSE 1 -->
                <div class="col-lg-4 col-md-6">
                    <div class="card h-100 border-0 shadow-sm rounded-4 course-card-hover">
                        <div class="card-body d-flex flex-column">
                            <span class="badge bg-primary mb-2 w-fit">{{c.level}}</span>

                            <h5 class="fw-bold mb-2">
                                {{c.name}}
                            </h5>

                            <p class="text-muted small mb-4">
                                {{c.description}}
                            </p>

                            <div class="mt-auto">
                                <a href="/my-courses/{{ c.id }}"
                                   class="btn btn-primary w-100 rounded-3">
                                    Xem chi tiết
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                {%endfor%}
            </div>
        </div>
    </div>
</div>

{% endblock %}
