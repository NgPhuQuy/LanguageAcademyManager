{% extends "layout/base.html" %}

{% block content %}

<div class="container-fluid py-5 px-lg-5">

    <!-- HEADER -->
    <div class="mb-4 ps-2">
        <h3 class="fw-bold mb-1" style="color:#3a3274">
            <i class="bi bi-clipboard-data me-2"></i>
            Báo cáo & Thống kê
            <span class="text-muted fw-semibold">({{ user_role }})</span>
        </h3>
        <p class="text-muted mb-0">
            Tổng hợp số liệu học viên và doanh thu hệ thống
        </p>
    </div>


    <div class="row g-4">


        <div class="col-lg-4 col-md-6">
            <div class="card border-0 shadow-sm rounded-4 h-100">

                <div class="card-header bg-transparent border-0 text-center pt-4">
                    <div class="fw-semibold" style="color:#5d54a4">
                        <i class="bi bi-people-fill me-1"></i>
                        Số lượng học viên theo lớp
                    </div>
                </div>

                <div class="card-body d-flex justify-content-center align-items-center">
                    <canvas id="cateChart" width="260" height="260"></canvas>
                </div>

            </div>
        </div>

        <!-- REVENUE -->
        <div class="col-lg-8 col-md-6">
            <div class="card border-0 shadow-sm rounded-4 h-100">

                <div class="card-header bg-transparent border-0 text-center pt-4">
                    <div class="fw-semibold" style="color:#5d54a4">
                        <i class="bi bi-bar-chart-line-fill me-1"></i>
                        Doanh thu theo tháng
                    </div>
                </div>

                <div class="card-body">
                    <canvas id="revenueChart" height="300"></canvas>
                </div>

            </div>
        </div>

    </div>

</div>

<script src="/static/js/my-stats.js"></script>

{% endblock %}
