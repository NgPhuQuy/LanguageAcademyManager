{% extends "layout/base.html" %}
{% block title %}
    {{ 'Chỉnh sửa nhiệm vụ' if task else 'Thêm nhiệm vụ' }}
{% endblock %}

{% block content %}
<div class="container my-5">

    <div class="card border-0 shadow rounded-4">
        <div class="card-body p-4">

            <h3 class="fw-bold text-primary mb-4">
                <i class="bi bi-journal-text me-2"></i>
                {{ 'Chỉnh sửa nhiệm vụ' if task else 'Thêm nhiệm vụ cho khóa học' }}
            </h3>

            <form method="post">

                <!-- COURSE -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Khóa học</label>
                    <select class="form-select" name="course_id" required>
                        {% for c in courses %}
                            <option value="{{ c.id }}"
                                {% if task and task.course_id == c.id %}
                                    selected
                                {% elif not task and c.id == selected_course_id %}
                                    selected
                                {% endif %}
                            >
                                {{ c.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- TITLE -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Tên nhiệm vụ</label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           required
                           value="{{ task.title if task else '' }}">
                </div>

                <!-- DESCRIPTION -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Mô tả</label>
                    <textarea name="description"
                              rows="4"
                              class="form-control">{{ task.description if task else '' }}</textarea>
                </div>

                <!-- DEADLINE -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Hạn nộp</label>
                    <input type="date"
                           name="deadline"
                           class="form-control"
                           required
                           value="{{ task.deadline.strftime('%Y-%m-%d') if task else '' }}">
                </div>

                <!-- ACTION -->
                <div class="d-flex justify-content-end gap-2">
                    <a href="/teacher/assignments"
                       class="btn btn-outline-secondary">
                        Hủy
                    </a>

                    <button class="btn btn-primary">
                        <i class="bi bi-save me-1"></i>
                        {{ 'Cập nhật' if task else 'Tạo nhiệm vụ' }}
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>
{% endblock %}
