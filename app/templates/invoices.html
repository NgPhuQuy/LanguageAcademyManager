{% extends "layout/base.html" %}

{% block content %}

<div class="container my-5">

    <!-- HEADER PAGE -->
    <div class="mb-4 ps-4">
        <h3 class="fw-bold mb-1" style="color:#3a3274">
          <i class="bi bi-receipt me-2"></i>
            Chào mừng, <span class="fw-semibold text-secondary">Cashier</span>
        </h3>
        <p class="text-muted mb-0">
            Quản lý hóa đơn và tình trạng học phí học viên
        </p>
    </div>

    <!-- ACTION BAR -->
    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body d-flex flex-column flex-md-row gap-3 justify-content-between align-items-md-center">

            <!-- SEARCH -->
            <div class="input-group w-100 w-md-50">
                <span class="input-group-text bg-light border-0">
                    🔎
                </span>
                <input type="text"
                       class="form-control border-0 shadow-none"
                       placeholder="Tìm kiếm học viên...">
            </div>

            <!-- ADD INVOICE -->
            <button class="btn text-white fw-semibold px-4"
                    style="background:#3a3274">
                <i class="bi bi-plus-circle me-1"></i>
                Lập hóa đơn
            </button>

        </div>
    </div>

    <!-- TABLE -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">

                <thead style="background:#f3f4fa">
                    <tr class="text-secondary fw-semibold">
                        <th>#</th>
                        <th>Học viên</th>
                        <th>Khóa học</th>
                        <th>Học phí</th>
                        <th>Ngày nộp</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Hành động</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td class="fw-semibold">Sĩ Thị A</td>
                        <td>English Basic</td>
                        <td class="fw-semibold text-success">
                            2.500.000₫
                        </td>
                        <td>10/12/2025</td>
                        <td>
                            <span class="badge rounded-pill bg-success-subtle text-success px-3">
                                Đã nộp
                            </span>
                        </td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-primary me-1">
                                Sửa
                            </button>
                            <button class="btn btn-sm btn-outline-danger">
                                Xóa
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td class="fw-semibold">Lê Văn B</td>
                        <td>French Beginner</td>
                        <td class="fw-semibold text-danger">
                            1.500.000₫
                        </td>
                        <td class="text-muted">—</td>
                        <td>
                            <span class="badge rounded-pill bg-danger-subtle text-danger px-3">
                                Chưa nộp
                            </span>
                        </td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-primary me-1">
                                Sửa
                            </button>
                            <button class="btn btn-sm btn-outline-danger">
                                Xóa
                            </button>
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>
    </div>

</div>

{% endblock %}
