{% extends "layout/base.html" %}
{% block content %}

<div class="container my-5 page-content teacher-attendance">

    <!-- HERO -->
    <section class="rounded-4 p-5 mb-5 text-white shadow"
             style="background:linear-gradient(135deg,#4f46e5,#6366f1,#06b6d4)">
        <div class="text-center">
            <h1 class="fw-bold mb-2">
                <i class="bi bi-clipboard-check me-2"></i>
                Điểm Danh Học Viên
            </h1>
            <p class="mb-0 opacity-75">
                Chọn khóa – chọn ngày – điểm danh học viên
            </p>
        </div>
    </section>

    <!-- FILTER -->
    <section class="card border-0 shadow rounded-4 mb-4">
        <div class="card-body p-4">
            <form method="get" class="row g-3 align-items-end">

                <div class="col-md-6">
                    <label class="form-label fw-semibold text-secondary">
                        Chọn khóa
                    </label>
                    <select class="form-select" name="course_id" required>
                        <option value="">-- Chọn khóa --</option>
                        {% for c in classes %}
                        <option value="{{ c.id }}"
                            {% if c.id|string == course_id %}selected{% endif %}>
                            {{ c.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold text-secondary">
                        Ngày điểm danh
                    </label>
                    <input type="date"
                           class="form-control"
                           name="date"
                           value="{{ date }}"
                           required>
                </div>

                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary fw-semibold">
                        Xem danh sách
                    </button>
                </div>

            </form>
        </div>
    </section>

    {% if students %}
    <section class="card border-0 shadow rounded-4">
        <div class="card-body p-4">

            <form method="post" action="/teacher/attendance/save">
                <input type="hidden" name="course_id" value="{{ course_id }}">
                <input type="hidden" name="date" value="{{ date }}">

                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center mb-0">
                        <thead style="background:#eef2ff">
                            <tr class="fw-semibold text-primary">
                                <th>STT</th>
                                <th class="text-start">Họ và Tên</th>
                                <th>Khóa</th>
                                <th>Điểm danh</th>
                            </tr>
                        </thead>

                        <tbody>
                        {% for s in students %}
                            <tr>
                                <td>{{ loop.index }}</td>
                                <td class="text-start">{{ s.name }}</td>
                                <td>{{ course_name }}</td>
                                <td>
                                    <input type="checkbox"
                                           class="form-check-input"
                                           name="attendance"
                                           value="{{ s.id }}"
                                           {% if attendance_map.get(s.id) %}checked{% endif %}>
                                </td>
                            </tr>
                        {% endfor %}
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <button type="submit"
                            class="btn fw-semibold text-white px-4"
                            style="background:linear-gradient(135deg,#4f46e5,#06b6d4)">
                        <i class="bi bi-save me-1"></i>
                        Lưu danh sách điểm danh
                    </button>
                </div>

            </form>

        </div>
    </section>
    {% endif %}

</div>

{% endblock %}
