<header class="mqd-header shadow-sm">
    <nav class="navbar navbar-expand-lg bg-white">
        <div class="container py-3">

            <!-- LOGO -->
            <a class="navbar-brand fw-bold fs-4 text-primary" href="/">
                THE MQD LANGUAGE
            </a>

            <!-- BURGER -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar"
                    aria-controls="mainNavbar"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- MENU (PHẢI BỌC TRONG collapse) -->
            <div class="collapse navbar-collapse justify-content-end"
                 id="mainNavbar">

                <div class="navbar-nav align-items-lg-center gap-3 mt-3 mt-lg-0">

                    <a href="/" class="mqd-nav-btn">Trang chủ</a>
                    <a href="/courses" class="mqd-nav-btn">Khóa Học</a>
                    <a href="/contact" class="mqd-nav-btn">Liên hệ</a>

                    {% if current_user.is_authenticated %}

                    <a href="/user/profile/{{current_user.id}}"
                       class="mqd-nav-btn">
                        Trang cá nhân
                    </a>
                    <!-- 🔔 NOTIFICATION -->
                    <div class="notification-wrapper">

                        <button class="notification-btn" id="notifyBtn">
                            🔔
                            <span class="notify-dot"></span>
                        </button>

                        <div class="notification-dropdown" id="notifyDropdown">
                            <h6 class="notify-title">Thông báo</h6>

                            <div class="notify-item">
                                <strong>Lịch học mới</strong>
                                <p>Lớp tiếng Anh giao tiếp bắt đầu tối nay</p>
                                <span>5 phút trước</span>
                            </div>

                            <a href="#" class="notify-view-all">Xem tất cả</a>
                        </div>

                    </div>


                    <!-- BOX SỐ DƯ -->
                    <div class="d-flex align-items-center px-3 py-2 rounded shadow text-white ms-lg-2"
                         style="background: linear-gradient(135deg,#00c6ff,#0072ff);">
                        <i class="bi bi-cash-coin me-2 fs-5"></i>
                        <span class="fw-bold me-3">
                            {{"{:,.0f}".format(current_user.money)}} VND
                        </span>
                        <a href="/topup"
                           class="btn btn-sm btn-light rounded-circle fw-bold"
                           title="Nạp tiền">
                            +
                        </a>
                    </div>

                    <a href="/logout"
                       class="mqd-nav-btn mqd-logout-btn ms-lg-2">
                        Đăng Xuất
                    </a>

                    {% else %}

                    <a href="/test" class="mqd-nav-btn">Thi thử</a>
                    <a href="/login" class="mqd-nav-btn mqd-auth-btn">Đăng Nhập</a>
                    <a href="/register" class="mqd-nav-btn mqd-auth-btn">Đăng Ký</a>

                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
</header>
