{% extends "layout/base.html" %}
{% block content %}

<section class="login-section d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">

            <div class="col-md-5 col-lg-4">
                <div class="login-card shadow-lg animate-fade">

                    <h3 class="text-center fw-bold mb-4 text-primary">
                        Đăng Nhập Tài Khoản
                    </h3>
                    <form method="post">
                        {%if err_msg%}
                        <div class="mb-3">
                            <span class="color: #b91c1c">{{err_msg}}</span>
                        </div>
                        {%endif%}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                            <span class="input-group-text bg-light">
                                📧
                            </span>
                                <input type="text"
                                       class="form-control"
                                       placeholder="Nhập username"
                                       name="username"
                                       required="required">
                            </div>
                        </div>

                        <!-- PASSWORD -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu</label>
                            <div class="input-group">
                            <span class="input-group-text bg-light">
                                🔒
                            </span>
                                <input type="password"
                                       class="form-control"
                                       placeholder="Nhập mật khẩu"
                                       name="password"
                                       required="required">
                            </div>
                        </div>

                        <!-- OPTIONS -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">
                                    Ghi nhớ đăng nhập
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none small text-primary">
                                Quên mật khẩu?
                            </a>
                        </div>

                        <!-- BUTTON LOGIN -->
                        <button class="btn btn-primary w-100 py-2 fw-semibold mb-3" type="submit">
                            Đăng Nhập
                        </button>
                    </form>
                    <!-- REGISTER -->
                    <div class="text-center">
                        <span class="text-muted">Chưa có tài khoản?</span>
                        <a href="/register" class="fw-semibold text-primary text-decoration-none">
                            Đăng ký ngay
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</section>

{% endblock %}
